  # Sequencing technology
  # Confirmed from SRA metadata: LibraryLayout = PAIRED
  # AvgSpotLen 500-501 = paired-end 2x250bp
  sequencing:
    layout: "paired"
    platform: "Illumina MiSeq"
    target_region: "V4"
    avg_read_length: 250

  # 16S V4 primers used by Baxter et al. 2019
  # 515F and 806R — Earth Microbiome Project standard primers
  # IUPAC degenerate bases: Y=C/T, M=A/C, N=any
  primers:
    forward: "GTGYCAGCMGCCGCGGTAA"    # 515F
    reverse: "GGACTACNVGGGTWTCTAAT"   # 806R

  # DADA2 denoising parameters
  # trunc_len: set from FastQC quality review
  # Forward reads maintain Q30 to ~230bp
  # Reverse reads drop Q30 at ~200bp
  # Confirmed consistent across original 10 samples
  dada2:
    trunc_len_f: 230
    trunc_len_r: 200
    max_ee_f: 2.0
    max_ee_r: 2.0
    trunc_q: 2
    n_threads: 4

  # Taxonomy assignment
  # SILVA 138 human stool weighted naive Bayes classifier
  # sklearn 1.4.2 compatible — required for QIIME2 2024.10
  # confidence 0.7 = minimum classification confidence threshold
  taxonomy:
    classifier: "results/qiime2/silva-138-classifier.qza"
    confidence: 0.7
    database: "SILVA 138"

  # Output directory structure
  output:
    raw_fastq: "data/raw/"
    fastqc: "results/fastqc/"
    multiqc: "results/multiqc/"
    qiime2_artifacts: "results/qiime2/"
    qiime2_exported: "results/qiime2/exported/"
    manifest: "data/manifest.tsv"

# ============================================================
# Phase 2 Expansion — June 2026
# Additional analyses added for presentation preparation
# PICRUSt2 functional profiling, LEfSe biomarker discovery,
# expanded diversity metrics, responder prediction model
# ============================================================

picrust2:
  # PICRUSt2 v2.5.2 — functional prediction from 16S ASVs
  # Requires dedicated conda environment: picrust2-env
  # Input: ASV table + representative sequences (FASTA)
  # Output: predicted KEGG pathway abundances
  nsti_threshold: 2.0        # exclude ASVs with NSTI > 2
  processes: 4               # parallel processes
  output_dir: "results/picrust2/"
  intermediate_dir: "results/picrust2/intermediate/"

# New diversity metrics — requires phylogenetic tree from PICRUSt2
diversity:
  rarefaction_depth: 9000    # set below minimum sample depth
  faith_pd: true             # requires PICRUSt2 tree
  weighted_unifrac: true     # requires PICRUSt2 tree
  chao1: true

# LEfSe parameters
lefse:
  lda_threshold: 2.5         # minimum LDA score for significance
  pvalue_threshold: 0.05

# Random Forest responder prediction
random_forest:
  n_estimators: 100
  test_size: 0.3
  random_state: 42
  n_features_to_plot: 15     # top features for SHAP plot

# New output paths
output_expansion:
  picrust2_pathways: "results/picrust2/pred_metagenome_unstrat.tsv"
  picrust2_analysis: "results/picrust2/pathway_enrichment.png"
  rarefaction_curve: "results/qiime2/exported/rarefaction_curve.png"
  alpha_diversity_all: "results/qiime2/exported/alpha_diversity_all_metrics.png"
  beta_diversity_unifrac: "results/qiime2/exported/beta_diversity_unifrac.png"
  spearman_correlation: "results/qiime2/exported/spearman_correlation.png"
  lefse_results: "results/qiime2/exported/lefse_results.png"
  random_forest: "results/qiime2/exported/random_forest_prediction.png"
  trajectory_plot: "results/qiime2/exported/butyrate_trajectory.png"
